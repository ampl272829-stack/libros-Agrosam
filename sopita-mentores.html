<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sopita de Mentores</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --accent: #c0762a;
      --accent-light: #dda050;
      --header-bg: #1a1410;
      --card-bg: #221a14;
      --text-muted: #baa890;
    }

    #galeria, #reader-view, .btn-volver { display: none; }

    .standalone-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .book-header {
      background: var(--header-bg);
      border-bottom: 3px solid var(--accent);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
    }

    .book-header h1 {
      margin: 0;
      font-size: 2rem;
      color: #fff;
    }

    .book-header .author {
      margin: 0.5rem 0 0;
      color: var(--accent-light);
      font-size: 1rem;
    }

    .book-intro {
      display: flex;
      align-items: center;
      gap: 3rem;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    .book-desc {
      flex: 1;
    }

    .book-desc p {
      color: var(--text-muted);
      line-height: 1.7;
      font-size: 1rem;
      margin: 0;
    }

    .author-side {
      flex-shrink: 0;
      width: 200px;
      text-align: center;
    }

    .author-name {
      margin: 0.5rem 0 0;
      font-size: 0.85rem;
      color: var(--accent-light);
      line-height: 1.4;
    }

    .author-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
      display: block;
      margin: 0 auto;
    }

    .book-pdf-section {
      flex: 1;
      padding: 0 2rem 2rem;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    .pdf-actions {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      justify-content: center;
    }

    .pdf-actions a {
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-download {
      background: var(--accent);
      color: #fff;
    }

    .btn-download:hover {
      background: var(--accent-light);
    }

    .btn-open {
      background: var(--card-bg);
      color: var(--accent-light);
      border: 1px solid var(--accent);
    }

    .btn-open:hover {
      background: var(--accent);
      color: #fff;
    }

    #pdf-viewer {
      background: #1a1a1a;
      padding: 1.5rem 1.5rem 3.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      position: relative;
    }

    #pdf-viewer::after {
      content: attr(data-caption);
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    #pdf-frame {
      width: 100%;
      height: 110vh;
      border-radius: 6px;
      display: block;
      border: none;
    }

    .footer-contact a {
      color: var(--accent-light);
    }

    .footer-contact a:hover {
      color: #fff;
    }

    .footer-contact svg {
      stroke: var(--accent-light);
    }

    .footer-contact a:hover svg {
      stroke: #fff;
    }

    @media (max-width: 700px) {
      .book-header h1 { font-size: 1.4rem; }
      .book-header { padding: 1.2rem 1rem; }
      .book-intro {
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        padding: 1.5rem 1rem;
      }
      .book-desc p { font-size: 0.9rem; }
      .author-side { width: 150px; }
      .author-img { width: 120px; height: 120px; }
      .book-pdf-section { padding: 0 1rem 1rem; }
      #pdf-viewer { padding: 0.8rem 0.8rem 3rem; }
      #pdf-frame { height: 80vh; }
      .pdf-actions { flex-direction: column; align-items: center; }
      .pdf-actions a { width: 100%; text-align: center; box-sizing: border-box; }
    }
  </style>
</head>
<body>
