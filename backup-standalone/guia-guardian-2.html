            ${libro.descripcion ? `<p class="descripcion">${libro.descripcion}</p>` : ''}
          </div>
        </div>
        <div id="pdf-actions">
          <a href="${libro.pdf}" target="_blank" class="btn-pdf" download>📥 Descargar PDF</a>
